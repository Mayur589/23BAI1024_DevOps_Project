apiVersion: apps/v1
kind: Deployment
metadata:
  name: corporate-website
  labels:
    app: corporate-website
spec:
  replicas: 2
  selector:
    matchLabels:
      app: corporate-website
  template:
    metadata:
      labels:
        app: corporate-website
    spec:
      containers:
      - name: website
        image: corporate-website:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 3
          periodSeconds: 10
