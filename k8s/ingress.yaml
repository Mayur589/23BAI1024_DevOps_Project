apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: corporate-website-ingress
  labels:
    app: corporate-website
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
  - host: corporate-website.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: corporate-website-service
            port:
              number: 80
